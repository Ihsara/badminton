# Local always-on deployment for the Windows machine.
#   docker compose up -d --build      # start (and rebuild on code changes)
#   docker compose logs -f            # watch
#   docker compose down               # stop
#
# restart: unless-stopped + Docker Desktop "start on login" == autostart on boot.
services:
  badminton:
    build: .
    container_name: badminton-bros
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # Set in .env (compose loads it automatically). Empty == read-only site.
      BADMINTON_EDIT_PASSWORD: ${BADMINTON_EDIT_PASSWORD:-}
      BADMINTON_MAX_UPLOAD_BYTES: ${BADMINTON_MAX_UPLOAD_BYTES:-8388608}
    volumes:
      # Private data repo (real Excel, roster, aliases, full git history).
      - ./data:/app/data
      # So the regenerated, sanitized data.json lands on the host for publishing.
      - ./web:/app/web
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # Always-on scraper for the upcoming-tournament timeline. Shares the image and
  # the ./data + ./web mounts with the web service, so the GUID-free
  # web/upcoming.json it builds lands on the host beside data.json for publishing,
  # while the private re-fetch state stays in ./data. Self-paces its refresh
  # (see upcoming_schedule.next_refresh_delay) to stay polite to the live site.
  upcoming:
    build: .
    container_name: badminton-upcoming
    restart: unless-stopped
    command: ["uv", "run", "badminton", "upcoming", "--watch",
              "--tournament", "1A563200-14BA-4328-955A-922A5EEC6374"]
    environment:
      # Scraper login — set in .env (compose loads it automatically).
      TOURNAMENTSOFTWARE_USERNAME: ${TOURNAMENTSOFTWARE_USERNAME:-}
      TOURNAMENTSOFTWARE_PASSWORD: ${TOURNAMENTSOFTWARE_PASSWORD:-}
      TOURNAMENTSOFTWARE_BASE_URL: ${TOURNAMENTSOFTWARE_BASE_URL:-https://badmintonfinland.tournamentsoftware.com}
    volumes:
      # Private data repo (holds upcoming_state.json with the re-fetch GUIDs).
      - ./data:/app/data
      # So the regenerated, GUID-free upcoming.json lands on the host for publishing.
      - ./web:/app/web
      # Persist the Playwright auth cookie (out/auth_state.json) across restarts,
      # so the watcher reuses its session instead of re-logging in every boot.
      - ./out:/app/out
